services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: eduhkvisa
      POSTGRES_USER: eduhkvisa
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?请在.env设置POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eduhkvisa -d eduhkvisa"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [internal]

  app:
    build: ./server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://eduhkvisa:${POSTGRES_PASSWORD}@db:5432/eduhkvisa
      PUBLIC_ORIGIN: https://${DOMAIN:?请在.env设置DOMAIN}
      SESSION_SECRET: ${SESSION_SECRET:?请在.env设置SESSION_SECRET}
      PAIRING_PEPPER: ${PAIRING_PEPPER:?请在.env设置PAIRING_PEPPER}
      ALLOW_REGISTRATION: ${ALLOW_REGISTRATION:-true}
      DATABASE_SSL: "false"
    depends_on:
      db:
        condition: service_healthy
    expose: ["3000"]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
        ]
      interval: 15s
      timeout: 5s
      retries: 5
    networks: [internal]

  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN:?请在.env设置DOMAIN}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
    networks: [internal]

networks:
  internal:

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
